name: Build and publish Docker image

# Builds the container image and pushes it to the GitHub Container Registry
# (GHCR) so it can be pulled on TrueNAS without building there. Runs on every
# push to main, on version tags, and on demand.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # -> ghcr.io/bobpanil/vivatlas

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR under this repo's namespace with GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build identity shown in Admin: a semver that ticks up one patch per
      # published build (1.0.0 -> 1.0.1 -> …), plus the commit and its date.
      # The patch is the workflow run number offset so the first build carrying
      # this feature (run 41) publishes as 1.0.0. Passed in as build-args below.
      - name: Compute build metadata
        id: build
        run: |
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cd --date=short HEAD)" >> "$GITHUB_OUTPUT"
          patch=$(( ${{ github.run_number }} - 41 ))
          if [ "$patch" -lt 0 ]; then patch=0; fi
          echo "version=1.0.$patch" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # TrueNAS SCALE is x86_64; build amd64 only to keep CI fast.
          platforms: linux/amd64
          build-args: |
            VIVATLAS_BUILD_VERSION=${{ steps.build.outputs.version }}
            VIVATLAS_BUILD_SHA=${{ steps.build.outputs.sha }}
            VIVATLAS_BUILD_DATE=${{ steps.build.outputs.date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
