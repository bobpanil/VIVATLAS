<!doctype html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>{% block subject %}VIVATLAS{% endblock %}</title>
</head>
{# Mail clients ignore external styles and strip <style> in <head>, so
   all styling is inline. Table-based layout: it's the only thing
   that both Gmail and Outlook render the same way. #}
<body style="margin:0; padding:0; background:#f2f2f0; color:#14161c;
             font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    {# Preheader: preview line in the inbox list. Hidden from the email itself. #}
    <div style="display:none; max-height:0; overflow:hidden; opacity:0;">
        {% block preheader %}VIVATLAS{% endblock %}
    </div>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
           style="background:#f2f2f0;">
        <tr><td align="center" style="padding:32px 16px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                   style="max-width:520px; background:#ffffff; border-radius:14px;
                          overflow:hidden; border:1px solid #e3e3df;">
                {# Header: dark bar with the name — the same dark as the topbar. #}
                <tr><td style="background:#04060d; padding:22px 28px;">
                    <span style="color:#ffffff; font-size:20px; font-weight:700;
                                 letter-spacing:0.5px;">VIVATLAS</span>
                </td></tr>

                <tr><td style="padding:32px 28px 12px;">
                    {% block content %}{% endblock %}
                </td></tr>

                <tr><td style="padding:20px 28px 30px;">
                    <hr style="border:none; border-top:1px solid #ececea; margin:0 0 16px;">
                    <p style="margin:0; color:#8a8d94; font-size:12px; line-height:1.5;">
                        {{ t('email.footer_auto') }}
                        {% block footer_note %}{% endblock %}
                    </p>
                </td></tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
